name: QMark
configFiles:
  Release: Local.xcconfig
  Debug: Local.xcconfig
options:
  bundleIdPrefix: com.qmark
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_HARDENED_RUNTIME: true
    DEVELOPMENT_TEAM: ""  # Set your Team ID in Local.xcconfig
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic

targets:
  QMark:
    type: application
    platform: macOS
    sources:
      - path: QMark
        type: group
      - path: SharedRenderer
        type: folder
        buildPhase: resources
      - path: EditorRenderer
        type: folder
        buildPhase: resources
    entitlements:
      path: QMark.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.network.client: true
    info:
      path: QMark/Info.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeRole: Editor
            LSHandlerRank: Default
            LSItemContentTypes:
              - net.daringfireball.markdown
              - com.unknown.md
              - com.qmark.mdx
              - com.qmark.rmd
              - com.qmark.mdown
              - com.qmark.mkd
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
          - UTTypeIdentifier: com.unknown.md
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
          - UTTypeIdentifier: com.qmark.mdx
            UTTypeDescription: MDX Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - mdx
          - UTTypeIdentifier: com.qmark.rmd
            UTTypeDescription: R Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - rmd
          - UTTypeIdentifier: com.qmark.mdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - mdown
          - UTTypeIdentifier: com.qmark.mkd
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - mkd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qmark.app
        PRODUCT_NAME: QMark
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: QMark/Info.plist
        CODE_SIGN_ENTITLEMENTS: QMark.entitlements
        GENERATE_INFOPLIST_FILE: false
    dependencies:
      - target: QMarkQuickLook

  QMarkQuickLook:
    type: app-extension
    platform: macOS
    sources:
      - path: QMarkQuickLook
        type: group
      - path: SharedRenderer
        type: folder
        buildPhase: resources
    entitlements:
      path: QMarkQuickLook/QMarkQuickLook.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.cs.disable-library-validation: true
        com.apple.security.temporary-exception.mach-lookup.global-name:
          - com.apple.nsurlsessiond
        com.apple.security.temporary-exception.files.absolute-path.read-only:
          - /
    info:
      path: QMarkQuickLook/Info.plist
      properties:
        CFBundlePackageType: XPC!
        NSExtension:
          NSExtensionPointIdentifier: com.apple.quicklook.preview
          NSExtensionPrincipalClass: QMarkQuickLook.PreviewViewController
          NSExtensionAttributes:
            QLSupportedContentTypes:
              - net.daringfireball.markdown
              - public.markdown
              - com.unknown.md
              - com.qmark.mdx
              - com.qmark.rmd
              - com.qmark.mdown
              - com.qmark.mkd
              - dyn.ah62d4rv4ge81e5pe
              - dyn.ah62d4rv4ge8043a
              - dyn.ah62d4rv4ge81c5pe
              - dyn.ah62d4rv4ge8043d2
              - dyn.ah62d4rv4ge8043dd
              - dyn.ah62d4rv4ge80c6dmqk
            QLSupportsSearchableItems: false
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: net.daringfireball.markdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
          - UTTypeIdentifier: com.unknown.md
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - md
                - markdown
          - UTTypeIdentifier: com.qmark.mdx
            UTTypeDescription: MDX Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - mdx
          - UTTypeIdentifier: com.qmark.rmd
            UTTypeDescription: R Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - rmd
          - UTTypeIdentifier: com.qmark.mdown
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - mdown
          - UTTypeIdentifier: com.qmark.mkd
            UTTypeDescription: Markdown Document
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - mkd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.qmark.app.quicklook
        PRODUCT_NAME: QMarkQuickLook
        CODE_SIGN_ENTITLEMENTS: QMarkQuickLook/QMarkQuickLook.entitlements
